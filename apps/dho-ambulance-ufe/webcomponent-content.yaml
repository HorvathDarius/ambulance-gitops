apiVersion: polyfea.github.io/v1alpha1
kind: WebComponent
metadata:
  name: dho-ambulance-ufe-content
spec:
  microFrontend: dho-ambulance-ufe
  element: dho-ambulance-wl-app
  attributes:
    - name: base-path
      value: /dho-ambulance-wl/
  displayRules:
    - allOf:
      - context-name: main-content
      - path: "^(\\.?/)?dho-ambulance-wl(/.*)?$"